      tailwind.config = {

  <style>
    body { background: #09090b; }
    .glow-cyan  { filter: drop-shadow(0 0 6px rgba(34,211,238,.9)); }
    .glow-green { filter: drop-shadow(0 0 6px rgba(52,211,153,.9)); }
    .glow-red   { filter: drop-shadow(0 0 8px rgba(248,113,113,.95)); }
    .glow-amber { filter: drop-shadow(0 0 6px rgba(251,191,36,.9)); }

    /* Scene parts: hover highlight + click affordance */
    .spart { transition: filter .15s ease; }
    .spart:hover { filter: drop-shadow(0 0 8px rgba(34,211,238,.85)); }
    .part-hi { filter: drop-shadow(0 0 10px rgba(34,211,238,.95)); }

    /* Build-mode "placement" pop-in */
    @keyframes placein { from { opacity: 0; transform: scale(.55); } to { opacity: 1; transform: scale(1); } }
    .placein { animation: placein .45s cubic-bezier(.2,.9,.3,1.2); transform-box: fill-box; transform-origin: center; }

    /* Highlight halo pulse */
    @keyframes halo { 0% { r: 22; opacity: .85; } 100% { r: 78; opacity: 0; } }
    .halo { animation: halo 1.6s ease-out infinite; }

    @keyframes dashflow { to { stroke-dashoffset: -24; } }
    .dashflow { stroke-dasharray: 6 6; animation: dashflow .6s linear infinite; }
    @keyframes radiowave { 0% { opacity: .9; } 100% { opacity: 0; } }
    .radiowave { animation: radiowave 1.8s ease-out infinite; }
    @keyframes crashflash { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
    .crashflash { animation: crashflash .35s steps(1) 3; }
    @keyframes slidein { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .slidein { animation: slidein .22s ease-out; }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }

const GLOSSARY = [{
  group: 'Devices',
  icon: '🛰️',
  items: [{
    term: 'Traffic Controller (TC)',
    def: 'The roadside computer cabinet that physically controls the traffic signal lights and timing phases based on loops, cameras, or fixed pre-timed schedules.'
  }, {
    term: 'Advanced Traffic Controller (ATC)',
    def: 'A modern Linux-based controller (per the ATC 5201 standard) that can natively generate and sign SAE J2735 SPaT/MAP, unlike legacy NEMA TS2 / Model 170 controllers that only speak NTCIP 1202 and need the RSU to convert.'
  }, {
    term: 'Roadside Unit (RSU)',
    def: 'An ITS device mounted on roadside infrastructure (like a signal pole) that facilitates wireless communication between the traffic controller and nearby vehicles or pedestrians.'
  }, {
    term: 'On-Board Unit (OBU)',
    def: "A hardware transceiver installed inside a vehicle that receives over-the-air messages from the RSU and broadcasts the vehicle's own real-time state."
  }, {
    term: 'ADAS',
    def: 'Advanced Driver-Assistance System — the in-vehicle brain that fuses incoming V2X messages with onboard sensors (radar/camera/lidar) to warn the driver or actuate braking and steering.'
  }, {
    term: 'Vehicle',
    def: 'The final node containing the central ADAS/CPU processing brain that pulls data from the OBU, coordinates sensor fusion with internal vehicle metrics, and acts on safety logic.'
  }, {
    term: 'VRU (Vulnerable Road User)',
