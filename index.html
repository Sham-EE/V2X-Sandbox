// Vehicle-type roles: car (obu), emergency (ev), transit bus (bus).
const isVehicle = t => t === 'obu' || t === 'ev' || t === 'bus';
const isMobile = t => isVehicle(t) || t === 'ped'; // can be given a travel direction
const canRequestPriority = t => t === 'ev' || t === 'bus'; // authorized to send a granted SRM

// Which two device types form which link when wired together.
function connKind(a, b) {
  const s = new Set([a, b]);
  if (isSensor(a) || isSensor(b)) return 'sensor'; // LiDAR/radar/camera detection feed
  // V2N — the cellular / cloud path
  if (s.has('celltower') && (isVehicle(a) || isVehicle(b))) return 'cellular'; // Uu air interface (vehicle ↔ tower)
  if (isNetwork(a) || isNetwork(b)) return 'backhaul'; // tower ↔ TMC/cloud, TMC ↔ RSU/hub (fiber/IP)
  if (s.has('tc') && s.has('rsu')) return 'ethernet';
  if (s.has('hub') && (s.has('tc') || s.has('rsu'))) return 'ethernet'; // V2X Hub backhaul
  if (s.has('ped')) return 'v2p';
  if (isVehicle(a) && isVehicle(b)) return 'v2v';
  if (s.has('rsu') && (isVehicle(a) || isVehicle(b))) return 'wireless';
  if (s.has('tc') && s.has('signal')) return 'signal';
  return 'generic';
}

// SAE J2735 messages the user can fine-tune, and their packet colors.
const ALL_MSGS = ['SPaT', 'MAP', 'TIM', 'SSM', 'BSM', 'SRM', 'PSM', 'SDSM'];
// Every message gets its own hue (validated for colorblind separation on the
// dark surface; the labeled toggle chips are the key). Anchors kept from the old
// grouping — SPaT cyan, BSM green, SRM amber, TIM violet — the former duplicates
// (MAP, SSM, PSM, SDSM) now have distinct hues. Sensor feeds are a cool family.
const MSG_COLOR = {
  SPaT: '#22d3ee',
  MAP: '#3b82f6',
  BSM: '#34d399',
  SSM: '#a3e635',
  SRM: '#fbbf24',
  PSM: '#f472b6',

  SDSM: '#fb923c',
  'point cloud': '#38bdf8',
  tracks: '#2dd4bf',
  video: '#818cf8',

};

// Orient a wired link so packets flow upstream (sensors/TC/hub) → RSU → downstream (OBU/VRU).
function orientLink(a, b) {
  const rank = t => isSensor(t) ? 0 : t === 'tc' ? 1 : t === 'hub' ? 2 : t === 'rsu' ? 3 : 4;
  return rank(a.type) <= rank(b.type) ? [a, b] : [b, a];
}

// Packet streams for one link, honoring the direction mode and enabled messages.
// dir: 'fwd' = infrastructure→vehicle · 'rev' = vehicle→infrastructure · 'both'.
// Returns [{ from:{x,y}, to:{x,y}, label, color }].
// `ctx` describes what the world provides, so only messages that make sense are
// generated: { signal, sensor, priority, network }. SPaT/MAP/SSM need a signal
// controller; SDSM needs a sensor feed; SRM/SSM need an authorized (EV/bus)
// requester; TIM needs a network (TMC/cell) source. Defaults to a full
// signalized intersection so callers that don't pass ctx keep old behavior.
function linkStreams(a, b, dir, enabled, mapStore, ctx) {
  const c = ctx || {
    signal: true,
    sensor: false,
    priority: true,
    network: true
  };
  const on = m => enabled[m] !== false;
  const showDown = dir === 'fwd' || dir === 'both';
  const showUp = dir === 'rev' || dir === 'both';
  const out = [];
  const push = (from, to, m, d) => {
    if (on(m)) out.push({
      from: {
        x: from.x,
        y: from.y
      },
      to: {
        x: to.x,
        y: to.y
      },
      label: m,
      color: MSG_COLOR[m],
      dir: d
    });
  };
  const kind = connKind(a.type, b.type);
  if (kind === 'sensor') {
    // LiDAR/radar/camera → infrastructure
    const [sen, infra] = isSensor(a.type) ? [a, b] : [b, a];
    // each sensor streams its own kind of raw data (proprietary, not OTA J2735);
    // the Hub/TC fuses these and generates an SDSM for the RSU to broadcast.
    const feed = sen.type === 'lidar' ? 'point cloud' : sen.type === 'radar' ? 'tracks' : 'video';
    if (showUp) out.push({
      from: {
        x: sen.x,
        y: sen.y
      },
      to: {
        x: infra.x,
        y: infra.y
      },
      label: feed,
      color: MSG_COLOR[feed],
      dir: 'up'
    });
    return out;
  }
  if (kind === 'cellular') {
    // V2N Uu air interface: vehicle ↔ cell tower
    const veh = isVehicle(a.type) ? a : b,
      tower = isVehicle(a.type) ? b : a;
    if (showDown) push(tower, veh, 'TIM', 'down'); // network pushes advisories down
    if (showUp) push(veh, tower, 'BSM', 'up'); // vehicle sends probe/telematics up
    return out;
  }
  if (kind === 'backhaul') {
    // V2N wired/fiber: TMC ↔ tower ↔ RSU/hub
    const rank = t => t === 'tmc' ? 0 : t === 'celltower' ? 1 : 2; // TMC/cloud is most upstream
    const [s, d] = rank(a.type) <= rank(b.type) ? [a, b] : [b, a];
    if (showDown) push(s, d, 'TIM', 'down'); // advisories flow out toward the edge
    if (showUp) push(d, s, 'BSM', 'up'); // aggregated probe data flows back to the cloud
    return out;
  }
  if (kind === 'signal') {
    // the TC physically drives the light
    const tc = a.type === 'tc' ? a : b,
      sig = a.type === 'tc' ? b : a;
    if (showDown) out.push({
      from: {
        x: tc.x,
        y: tc.y
      },
      to: {
        x: sig.x,
        y: sig.y
      },
      label: 'phase',
      color: '#fbbf24',
      dir: 'ctl'
    });
    return out;
  }
  if (kind === 'v2p') {
    // pedestrian ↔ vehicle / RSU (both ways)
    const ped = a.type === 'ped' ? a : b,
      other = a.type === 'ped' ? b : a;
    if (showUp) push(ped, other, 'PSM', 'up'); // VRU announces itself
    if (showDown) push(other, ped, other.type === 'rsu' ? 'SPaT' : 'BSM', 'down'); // RSU→ped: crossing timing · vehicle→ped: BSM to warn the phone
    return out;
  }
  if (kind === 'v2v') {
    // BSM exchanged both ways
    if (showUp) {
      push(a, b, 'BSM', 'up');
      push(b, a, 'BSM', 'up');
    }
    return out;
  }
  if (kind === 'generic') {
    if (showDown) out.push({
      from: {
        x: a.x,
        y: a.y
      },
      to: {
        x: b.x,
        y: b.y
      },
      label: 'data',
      color: MSG_COLOR.data,
      dir: 'down'
    });
    return out;
  }
  // ethernet / wireless — real bidirectional V2I traffic, but only the messages
  // the world can actually justify (see ctx). SPaT/MAP/SSM require a signal;
  // SDSM requires a sensor feed; TIM requires a network source.
  const wireless = kind === 'wireless';
  const [s, d] = orientLink(a, b);
  const down = [];
  if (c.signal) down.push('SPaT');
  // MAP (intersection geometry): broadcast over the air whenever there's a
  // signal; on the cabinet wire only when MAP is stored on the TC.
  if (c.signal && (wireless || mapStore === 'tc')) down.push('MAP');
  if (c.sensor) down.push('SDSM'); // fused sensor detections
  if (c.network) down.push('TIM'); // network-sourced advisories
  if (c.signal && c.priority) down.push('SSM'); // signal-status reply (only if priority can be requested)
  // Upstream: every vehicle sends BSM. An SRM only exists when there's a signal
  // to request priority from AND an authorized (EV/bus) requester.
  const veh = d; // downstream endpoint = the vehicle on a wireless link
  const up = ['BSM'];
  if (c.signal && c.priority && (!wireless || canRequestPriority(veh.type))) up.push('SRM');
  if (showDown) down.forEach(m => push(s, d, m, 'down'));
  if (showUp) up.forEach(m => push(d, s, m, 'up'));
  return out;
}

const MSG_SPEC = {

// Approx. downstream load the TC pushes onto the cabinet wire (kbps). MAP only
// rides the wire when it is stored on the TC — that's the tradeoff, quantified.
function backhaulKbps(enabled, mapStore) {
  const msgs = ['SPaT', 'SSM'].concat(mapStore === 'tc' ? ['MAP'] : []);
  let bps = 0;
  msgs.forEach(m => {
    if (enabled[m] !== false) {
      const s = MSG_SPEC[m];
      bps += s.bytes * s.hz * 8;
    }
  });
  return Math.round(bps / 1000);
}

// `format` (optional): the real-world wire/message layout, shown via a toggle.
// Byte layouts for IETF/IEEE protocols are public & accurate; SAE J2735 and
// NTCIP 1202 object text are copyrighted (paywalled), so those structures are
// accurate *representative* sketches from public documentation, labeled as such.
const GLOSSARY = [{
  group: 'Devices',
  icon: '🛰️',
  items: [{
    term: 'Traffic Controller (TC)',
    def: 'The roadside computer cabinet that physically controls the traffic signal lights and timing phases based on loops, cameras, or fixed pre-timed schedules.'
  }, {
    term: 'Advanced Traffic Controller (ATC)',
    def: 'A modern Linux-based controller (per the ATC 5201 standard) that can natively generate and sign SAE J2735 SPaT/MAP, unlike legacy NEMA TS2 / Model 170 controllers that only speak NTCIP 1202 and need the RSU to convert.'
  }, {
    term: 'Load Switch',
    def: 'A solid-state relay in the signal cabinet. The controller only emits low-voltage logic; the load switch takes that command and switches the actual field power (LED driver / 120 VAC) out to one signal channel. Power then runs through the cabinet terminals, underground conduit, and up the pole to the signal head — the TC never drives the LEDs directly.'
  }, {
    term: 'Conflict Monitor (MMU)',
    def: 'The Malfunction Management Unit — an independent safety device in the cabinet that continuously watches the load-switch outputs. If it ever detects conflicting greens (or other faults), it overrides the controller and drops the intersection to flashing red.'
  }, {
    term: 'Roadside Unit (RSU)',
    def: 'An ITS device mounted on roadside infrastructure (like a signal pole) that facilitates wireless communication between the traffic controller and nearby vehicles or pedestrians.'
  }, {
    term: 'On-Board Unit (OBU)',
    def: "A hardware transceiver installed inside a vehicle that receives over-the-air messages from the RSU and broadcasts the vehicle's own real-time state."
  }, {
    term: 'ADAS',
    def: 'Advanced Driver-Assistance System — the in-vehicle brain that fuses incoming V2X messages with onboard sensors (radar/camera/lidar) to warn the driver or actuate braking and steering.'
  }, {
    term: 'Vehicle',
    def: 'The final node containing the central ADAS/CPU processing brain that pulls data from the OBU, coordinates sensor fusion with internal vehicle metrics, and acts on safety logic.'
  }, {
    term: 'VRU (Vulnerable Road User)',
    def: 'A pedestrian, cyclist, or road worker — a road user with no protective vehicle shell — whose position and presence are shared over V2X via a PSM.'
  }, {
    term: 'V2X Hub',
    def: 'A roadside computing platform (the USDOT reference implementation is open-source) that sits between the field devices and the RSU. It runs application plugins that fuse sensor detections (LiDAR/radar/camera), bridge the controller’s NTCIP 1202 to SAE J2735, and generate messages — even a PSM for a pedestrian who has no device — for the RSU to broadcast. It does not transmit over the air itself or control the signal.'
  }, {
    term: 'Roadside Sensors (LiDAR / Radar / Camera)',
    def: 'Infrastructure detection sensors mounted on poles/mast arms. Unlike V2X, they see UNEQUIPPED road users (no OBU or phone). LiDAR gives centimetre 3-D position day or night; radar measures speed/range in any weather and replaces inductive loops; AI cameras classify road users and read events like red-light running. Their detections feed the controller / V2X Hub, which can then speak V2X on a road user’s behalf.'
  }, {
    term: 'Cell Tower (gNodeB / eNodeB)',
    def: 'The cellular base station that carries V2N (Vehicle-to-Network) traffic. A vehicle’s cellular modem reaches it over the “Uu” network air interface (4G LTE eNodeB / 5G gNodeB) — this is the mobile network, NOT the 5.9 GHz safety radio used for direct V2V/V2I. The tower backhauls over fiber/IP to the mobile core and out to the internet. Wide-area reach, but higher latency, so V2N carries information (advisories), not split-second safety.'
  }, {
    term: 'TMC / Cloud (V2N backend)',
    def: 'The Traffic Management Center or cloud platform — the agency backend that connected vehicles reach over the cellular network. It aggregates probe data and feeds from many sources (511, incident/CAD systems, sensors) and publishes advisories back out as TIM messages (work zones, weather, incidents), region-wide. It reaches vehicles via the path: TMC ↔ internet ↔ cell tower ↔ vehicle (and can also feed RSUs/hubs over the backhaul).'
  }]
}, {
  group: 'Standards › Communication',
  icon: '📶',
  items: [{
    term: 'Ethernet (IEEE 802.3)',
    def: 'The physical, high-speed wired connection typically used within the intersection cabinet to link the Traffic Controller to the RSU.',
    format: `Ethernet II frame (IEEE 802.3)
+----------+----------+------+-------------------+-----+
| Dst MAC  | Src MAC  | Type | Payload 46–1500 B | FCS |
|  6 bytes |  6 bytes | 2 B  |  (e.g. IP packet) | 4 B |
+----------+----------+------+-------------------+-----+
Preamble (7B) + SFD (1B) precede the frame.
EtherType: 0x0800 = IPv4 · 0x86DD = IPv6 · 0x0806 = ARP`
  }, {
    term: 'TCP/IP',
    def: 'The standard internet protocol suite providing reliable, connection-oriented data transmission over wired infrastructure networks.',
    format: `IPv4 header (20 bytes) then TCP/UDP payload — RFC 791
 0      4       8             16                      31
+------+-------+--------------+------------------------+
|Ver=4 | IHL   | DSCP / ECN   | Total Length           |
+------+-------+--------------+-----+------------------+
| Identification             |Flags| Fragment Offset  |
+--------------+-------------+-----+-------------------+
| TTL          | Protocol    | Header Checksum         |
|              | 6=TCP 17=UDP|                         |
+--------------+-------------+-------------------------+
| Source IPv4 Address (32 bits)                        |
| Destination IPv4 Address (32 bits)                   |
+------------------------------------------------------+`
  }, {
    term: 'UDP',
    def: 'A lightweight, connectionless transport protocol often favored in time-critical V2X operations where speed is prioritized over packet-delivery verification.',
    format: `UDP datagram header (8 bytes) — RFC 768
 0                16               31
+-----------------+----------------+
| Source Port     | Dest Port      |
+-----------------+----------------+
| Length          | Checksum       |
+-----------------+----------------+
| Data … (e.g. WSMP / SAE J2735)   |
+----------------------------------+`
  }, {
    term: 'DSRC (IEEE 802.11p)',
    def: 'Dedicated Short-Range Communications; an older Wi-Fi-derived wireless standard operating in the 5.9 GHz spectrum for localized vehicular communication.',
    format: `DSRC / WAVE stack (5.9 GHz, 10 MHz channels)
IEEE 802.11p MAC (OCB mode — no association)
  └─ LLC / SNAP
      └─ WSMP  (IEEE 1609.3 — WAVE Short Message)
           • Version • PSID (provider service id)
           • Channel • DataRate • TxPower
           • WSM Length
           └─ IEEE 1609.2 secured payload
                 └─ SAE J2735 MessageFrame`
  }, {
    term: 'C-V2X (3GPP)',
    def: 'Cellular Vehicle-to-Everything; a modern cellular-based communication standard utilizing direct PC5 sidelink communication to allow low-latency V2X transmissions without requiring a cellular network tower.',
    format: `C-V2X PC5 sidelink (3GPP Rel-14+)
PHY: SC-FDMA @ 5.9 GHz, sub-channelized
  └─ MAC  (Mode 4 autonomous / Mode 3 scheduled)
      └─ RLC / PDCP
          └─ IEEE 1609.2 secured payload
                └─ SAE J2735 MessageFrame
Direct device-to-device — no cellular tower required.`
  }, {
    term: 'Cellular Uu (V2N)',
    def: 'The “Uu” interface is the normal cellular network link between a device and a base station — as opposed to PC5, which is the direct device-to-device sidelink. V2N uses Uu: the vehicle talks through a cell tower (eNodeB/gNodeB) to the mobile core and the cloud/TMC. It reaches far beyond line of sight but has higher, variable latency, so it carries advisories (TIM) and probe data, not split-second safety warnings.',
    format: `V2N over cellular — the Uu path
Vehicle (cellular modem)
  └─ Uu air interface (4G LTE / 5G NR)
       └─ Cell tower (eNodeB / gNodeB)
            └─ Mobile core (EPC / 5GC)
                 └─ Internet / IP backhaul
                      └─ TMC / Cloud (application server)
Downlink: TIM advisories · Uplink: BSM/probe data
Contrast: PC5 sidelink = direct, no tower (V2V/V2I).`
  }]
}, {
  group: 'Standards › Messages',
  icon: '📨',
  items: [{
    term: 'NTCIP 1202',
    def: 'The National Transportation Communications for ITS Protocol standard regulating how traffic signal controllers store and transmit signal phase and timing data over wired networks.',
    format: `NTCIP 1202 — signal-controller objects (SNMP MIB)
Accessed via SNMP GET/SET on OIDs (BER-encoded).
Enterprise root: 1.3.6.1.4.1.1206  (NEMA / AASHTO / ITE)
Representative phase / SPaT objects:

Encoding: UPER (Unaligned Packed Encoding Rules).

    format: `BasicSafetyMessage — representative ASN.1
